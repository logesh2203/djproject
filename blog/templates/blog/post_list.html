<!DOCTYPE html>
<html>
<head>
    <title>Logesh's Blog</title>
    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
            margin: 0;
        }
        .container {
            max-width: 900px;
            margin: auto;
            padding: 40px;
        }
        .post {
            background: white;
            padding: 25px;
            margin-bottom: 25px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }
        .post h2 {
            margin-top: 0;
            color: #c95c0c;
        }
        .empty {
            text-align: center;
            padding: 80px;
            color: #666;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Latest Articles</h1>

    {% if posts %}
        {% for post in posts %}
            <div class="post">
                <h2>{{ post.title }}</h2>
                <p>{{ post.content|truncatewords:40 }}</p>
            </div>
        {% endfor %}
    {% else %}
        <div class="empty">
            <h2>No posts yet 🚀</h2>
            <p>Great ideas are coming soon. Stay tuned!</p>
        </div>
    {% endif %}
</div>

</body>
</html>
